    english: `Abdullah from Dharapuram asks a question. TNTJ states that the opening supplication 'Subhanakallahumma', recited in prayer by the Sunnat Jamath, is weak. Why is that dua weak? Who is the narrator? In which book has it been criticized?

As soon as the Takbeer is pronounced, people recite three different duas. First — 'Wajjahtu wajhiya lilladhi'. Second — 'Allahumma ba'id baini wa baina khatayaya'. Third — 'Subhanakallahumma wa bihamdika wa tabarakasmuka wa ta'ala jadduka wa la ilaha ghairuka', recited by many followers of the Hanafi Madhhab.

Among these three, there is authentic proof for Wajjahtu and Allahumma ba'id. But we say there is no acceptable evidence to recite 'Subhanakallahumma', referred to as Sana. There are four reasons for this.

First — Muslim Hadith 606 states that Umar Radiyallahu Anhu would say these words aloud. It does not say he said it in prayer. The Messenger of Allah is not involved in this at all.

Second — it does not even state that Umar said this during prayer. He may have said it to praise Allah on some occasion. There is no detail indicating it should be said in prayer immediately after Takbeer.

Third — those who take this as evidence do not practice it themselves. They show the loud recitation as evidence but recite it silently themselves.

Fourth — the narrator who reported this from Umar Radiyallahu Anhu is Abdah. He never even met Umar. Imam Nawawi states that their time periods do not match. Hafiz Ibn Hajar also notes a disconnection in the chain of narrators.

Regarding Tirmidhi Hadith 225, which associates this with the Messenger of Allah — those who take Subhanakallahumma as evidence consider this the most authentic hadith. However, this hadith mentions that when rising for prayer in the night, he would say Takbeer, then Subhanakallahumma, then Allahu Akbar Kabira, then A'udhu billahi. But they take only the Subhanakallahumma portion without implementing the rest. Furthermore, since it specifies night prayer, it does not apply to the five obligatory daily prayers. The narrator Ali bin Ali has been criticized by Yahya bin Sa'id and Ahmad ibn Hanbal. Imam Tirmidhi himself explained this criticism alongside the hadith.

For all these reasons, reciting Subhanakallahumma is not correct. When we have evidence that the Messenger of Allah did this, recite 'Allahumma ba'id' or recite 'Wajjahtu'.`

இவற்றிலிருந்து என்ன விளங்குகிறது என்றால் — வீட்டில் தொழுவது செல்லாது என்பதெல்லாம் கிடையாது. தக்க காரணம் இருக்க வேண்டும். உடம்பு சரியில்லை என்பது தக்க காரணம்தான். ஒருவர் அல்லாஹ்வுக்குப் பயந்து தனக்கு தக்க காரணம் இருக்கிறது என்று நினைத்து வீட்டில் தொழுகிறார் என்றால் அல்லாஹ் அதை ஏற்றுக்கொள்வான். ஆனால் முடியும் என்ற நிலையில் பள்ளிக்கு வருவதுதான் சிறந்தது — அது இருபத்தி ஏழு மடங்கு நன்மையைத் தரும்.`,
    english: `Saleem asks a question — I am unwell and unable to go to the mosque to pray. If I pray at home, will it be accepted?

There are many hadiths that emphasize going to the mosque to pray. Praying in congregation brings twenty-seven times the reward. But regarding whether praying at home is accepted when unwell — the Messenger of Allah Sallallahu Alaihi Wasallam himself prayed like that. Bukhari Hadith 688 states that when the Messenger of Allah was unwell, he prayed in his house. He prayed sitting down, and the people stood and prayed following him.

Bukhari Hadith 667 — there was a Sahabi named Itban bin Malik who lived outside Madinah and was blind. He came to the Messenger of Allah and said — there is darkness, flooding, and rain, and I am blind. Please come to my house and pray in one spot. I will make that my place of prayer. The Messenger of Allah accepted his request and went to his house and prayed there.

Bukhari Hadith 670 — a man from the Ansar was so heavily built that he was unable to carry his body and come to the mosque. He prepared food for the Messenger of Allah, invited him, and said — after eating, please pray and show me a spot. I will pray there. The Messenger of Allah accepted his invitation, went, and prayed two rak'ahs there for him.

Muslim Hadith 1054 — when the Messenger of Allah was at the house of Anas Radiyallahu Anhu and the prayer time arrived, he did not return to Masjid an-Nabawi. He ordered a mat to be spread, sprinkled water on it, and prayed the obligatory prayer right there in Anas's house.

From all of this, what is understood is — praying at home is not invalid. There must be a valid reason. Being unwell is a valid reason. If a person fears Allah and believes he has a valid reason and prays at home, Allah will accept it. However, if one is able, coming to the mosque is better — it brings twenty-seven times the reward.`
  }

<script>
  let currentText = '';
  let currentFileName = '';

  function formatAmount(n) {
    return '₹ ' + n.toLocaleString('en-IN');
  }

  function buildTable() {
    const tbody = document.getElementById('table-body');

    DELIVERIES.forEach(d => {
      const row = `
        <tr>
          <td class="sr-num">${String(d.sr).padStart(2,'0')}</td>
          <td class="title-text">${d.title}</td>
          <td><button class="btn-link btn-video" onclick="openVideo('${d.videoLink}')">▶ Watch</button></td>
          <td><button class="btn-link btn-tamil" onclick="showPanel('tamil', ${d.sr - 1})">தமிழ் View</button></td>
          <td><button class="btn-link btn-english" onclick="showPanel('english', ${d.sr - 1})">English View</button></td>
          <td class="duration-text">${d.duration}</td>
        </tr>`;
      tbody.innerHTML += row;
    });
  }

  function openVideo(url) {
    window.open(url, '_blank');
  }

  function showPanel(type, index) {
    const d = DELIVERIES[index];
    const overlay = document.getElementById('overlay');
    const typeLabel = document.getElementById('panel-type-label');
    const videoTitle = document.getElementById('panel-video-title');
    const body = document.getElementById('panel-body');
    const info = document.getElementById('panel-info');
    const dlBtn = document.getElementById('panel-download');

    videoTitle.textContent = d.title;

    if (type === 'tamil') {
      typeLabel.textContent = 'Tamil Transcription';
      typeLabel.style.color = '#8ab4f8';
      body.textContent = d.tamil;
      info.textContent = 'Session ' + d.sr + ' · Tamil Transcription';
      currentText = d.tamil;
      currentFileName = 'Session_' + d.sr + '_Tamil.txt';
      dlBtn.style.display = 'inline-flex';
    } else {
      typeLabel.textContent = 'English Translation';
      typeLabel.style.color = '#c8a8ff';
      body.textContent = d.english;
      info.textContent = 'Session ' + d.sr + ' · English Translation';
      currentText = d.english;
      currentFileName = 'Session_' + d.sr + '_English.txt';
      dlBtn.style.display = 'inline-flex';
    }

    overlay.style.display = 'flex';
  }

  function closePanel(event) {
    if (!event || event.target === document.getElementById('overlay')) {
      document.getElementById('overlay').style.display = 'none';
    }
  }

  function downloadText() {
    const blob = new Blob([currentText], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = currentFileName;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // Close panel on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') document.getElementById('overlay').style.display = 'none';
  });

  // Build on load
  buildTable();
</script>
